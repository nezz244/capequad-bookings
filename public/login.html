<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Cape Adrenaline admin login" />
    <title>capeadrenaline_management</title>
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-brand-panel" aria-label="Cape Adrenaline operations">
            <div class="brand-lockup">
                <span class="brand-mark">CA</span>
                <div>
                    <p class="eyebrow">Cape Adrenaline</p>
                    <h1>Management desk</h1>
                </div>
            </div>
            <div class="login-panel-copy">
                <p>Capture bookings from every sales channel, keep the team aligned, and run the day from one shared calendar.</p>
            </div>
            <div class="login-metrics">
                <div>
                    <strong>Fomo</strong>
                    <span>marketplace bookings</span>
                </div>
                <div>
                    <strong>GYG</strong>
                    <span>multiple products</span>
                </div>
                <div>
                    <strong>Walk-ins</strong>
                    <span>cash desk ready</span>
                </div>
            </div>
        </section>

        <section class="login-card" aria-label="Admin login">
            <div class="login-card-header">
                <p class="eyebrow">Admin access</p>
                <h2>Sign in</h2>
            </div>
            <form class="user login-form">
                <label for="inputEmail">Email address</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input id="inputEmail" type="email" placeholder="admin@example.com" autocomplete="email" required />
                </div>

                <label for="inputPassword">Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input id="inputPassword" type="password" placeholder="Enter password" autocomplete="current-password" required />
                </div>

                <label class="remember-row" for="inputRememberPassword">
                    <input id="inputRememberPassword" type="checkbox" value="" />
                    <span>Keep me signed in on this device</span>
                </label>

                <button type="submit" class="btn btn-primary login-submit">
                    <span>Open dashboard</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script type="module" src="index.mjs"></script>
</body>
</html>
