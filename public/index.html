<script>
    document.addEventListener('DOMContentLoaded', function () {
        // 1. Add the custom date range filter
        $.fn.dataTable.ext.search.push(
            function (settings, data, dataIndex) {
                const min = $('#minDate').val();
                const max = $('#maxDate').val();
                const dateStr = data[3]; // "Date" column index (adjust if needed)
                const date = new Date(dateStr);

                if (
                    (!min || new Date(min) <= date) &&
                    (!max || new Date(max) >= date)
                ) {
                    return true;
                }
                return false;
            }
        );

        // 2. Attach event listeners to filter inputs
        $('#minDate, #maxDate').on('change', function () {
            $('#datatablesSimple').DataTable().draw();
        });

        // 3. Load data and initialize DataTable
        breakDown('currentBalance');
    });

    function breakDown(filter) {
        let url;

        if (filter === 'currentBalance') {
            url = `/chacco/balance_breakdown/all`;
        } else {
            url = `/civil-servants?filter=${filter}`;
        }

        fetch(url)
            .then(response => response.json())
            .then(data => {
                let transactions = [];

                if (filter === 'currentBalance') {
                    data.clients.forEach(client => {
                        transactions.push({
                            transactionName: `${client.client_name} Initial Payment`,
                            income: client.amount_paid,
                            expense: null,
                            date: new Date(client.date_joined),
                            notes: ''
                        });
                    });

                    data.installments.forEach(installment => {
                        transactions.push({
                            transactionName: `${installment.client_name} Installment`,
                            income: installment.amount,
                            expense: null,
                            date: new Date(installment.installment_date),
                            notes: ''
                        });
                    });

                    data.expenses.forEach(expense => {
                        transactions.push({
                            transactionName: expense.expense_name,
                            income: null,
                            expense: expense.amount,
                            date: new Date(expense.expense_date),
                            notes: expense.notes || ''
                        });
                    });
                } else {
                    data.forEach(client => {
                        transactions.push({
                            transactionName: client.client_name,
                            income: null,
                            expense: null,
                            date: new Date(client.transaction_date),
                            notes: ''
                        });
                    });
                }

                transactions.sort((a, b) => a.date - b.date);

                const tableBody = document.querySelector('#datatablesSimple tbody');
                tableBody.innerHTML = '';

                transactions.forEach(transaction => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${transaction.transactionName}</td>
                        <td>${transaction.income ?? ''}</td>
                        <td>${transaction.expense ?? ''}</td>
                        <td>${transaction.date.toLocaleDateString('en-CA').replace(/-/g, '/')}</td>
                        <td>${transaction.notes}</td>
                    `;
                    tableBody.appendChild(row);
                });

                if ($.fn.dataTable.isDataTable('#datatablesSimple')) {
                    $('#datatablesSimple').DataTable().clear().rows.add(transactions.map(transaction => {
                        return [
                            transaction.transactionName,
                            transaction.income ?? '',
                            transaction.expense ?? '',
                            transaction.date.toLocaleDateString('en-CA').replace(/-/g, '/'),
                            transaction.notes
                        ];
                    })).draw();
                } else {
                    $('#datatablesSimple').DataTable({
                        data: transactions.map(transaction => [
                            transaction.transactionName,
                            transaction.income ?? '',
                            transaction.expense ?? '',
                            transaction.date.toLocaleDateString('en-CA').replace(/-/g, '/'),
                            transaction.notes
                        ]),
                        columns: [
                            { title: 'Transaction Name' },
                            { title: 'Income' },
                            { title: 'Expense' },
                            { title: 'Date' },
                            { title: 'Notes' }
                        ],
                        dom: 'Bfrtip',
                        buttons: ['copy', 'csv', 'excel', 'pdf', 'print']
                    });
                }

            })
            .catch(error => {
                console.error('Error fetching data:', error);
            });
    }
</script>
