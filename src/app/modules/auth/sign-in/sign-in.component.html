
<ng-container *ngIf="!isLoading">
<!-- background-image -->
<div class="flex flex-col flex-auto items-center sm:justify-center min-w-0 -mt-10  bg-card" >
   <div class="flex flex-inline w-screen">
    
        <div class="flex flex-inline ml-auto items-end mr-10">
            <span class="text-md text-gray-900 ">Don't have an account yet?</span> 
            <button [routerLink]="'/sign-up'" class=" text-gray-900 mat-stroked-button text-sm max-h-3 rounded-sm ml-3">
                Sign up
            </button>
            <a class="text-gray-900 basefont-light ml-3 text-md underline" href="mailto:info@chatinc.com">Contact us</a>
        </div>
   </div>
    <div  class="w-64 sm:w-64 py-8 px-2 mt-40 sm:mt-0 sm:p-12 sm:rounded-2xl  bg-card ">
        <div class="max-w-64 sm:w-64 mx-auto sm:mx-0">
            <!-- Logo -->
            <!-- <div class="text-center">
                <img class="w-100 pl-20" src="assets/images/logo/chatsooner.png">
            </div> -->

         <div class="mt-6 text-7xl font-bold tracking-tight text-center  items-center leading-tight text-accent">CapeAdrenaline</div>
         <div class="mt-3 text-xl  tracking-tight text-center  items-center font-normal leading-tight " style="color: #737373 !important;">Howdy, who's this?</div>

           

            <!-- Sign in form -->
            <form
                class="mt-8 max-w-64"
                [formGroup]="signInForm"
               
                #signInNgForm="ngForm"
                >

                <!-- Email field -->
             
                <div>
                    <label class="text-accent-900 mb-1  text-lg font-light">Email</label>

                </div>
                <div class="w-full mb-3 mt-1">
                    <input
                    (click)="onFocus('email')"
                    id="email"
                    autofocus
                    matInput
                    class="border border-gray-900 pl-2 text-lg rounded-sm w-full border border-dark min-h-8  shadow-primary"
                    [ngClass]="{'ring':isFocused==='email'}"
                    [formControlName]="'email'">
                 
                </div>
                
                
                

                <!-- Password field -->

                <div>
                    <label class="text-accent-900 mb-1  text-lg font-light">Password</label>

                </div>
                <div class="w-full mb-5 mt-1">
                    <input
                    (click)="onFocus('password')"
                    #passwordField
                    matInput
                    id="password"
                    type="password"
                    class="border border-gray-900 pl-2 text-lg  rounded-sm w-full border border-dark min-h-8  shadow-primary"
                    placeholder=""
                    [ngClass]="{'ring':isFocused==='password'}"
                    [formControlName]="'password'">
                    <div class="-mt-9 w-full flex flex-inline">
                                    
                        <button
                            class="ml-44 z-40"
                            mat-icon-button
                            type="button"
                            (click)="passwordField.type === 'password' ? passwordField.type = 'text' : passwordField.type = 'password'"
                            matSuffix>
                            <mat-icon
                                class="icon-size-5 text-chami-gray"
                                *ngIf="passwordField.type === 'password'"
                                [svgIcon]="'feather:eye'"></mat-icon>
                            <mat-icon
                                class="icon-size-5 text-chami-gray"
                                *ngIf="passwordField.type === 'text'"
                                [svgIcon]="'feather:eye-off'"></mat-icon>
                        </button>
                  
                     </div>
                </div>
                



                <!-- Actions -->
                <div class="inline-flex items-end justify-between w-full mt-1">
                 
                    <a
                        class="text-md font-normal text-gray-500 hover:underline underline hover:text-primary-500"
                        [routerLink]="['/forgot-password']">Forgot password?
                    </a>
                </div>

                <!-- Submit button -->
                <button
                    
                    class="fuse-mat-button-large rounded-sm w-full mt-4 bg-accent-900"
                    
                    mat-flat-button
                    [disabled]="isLoading3"
                    (click)="submit()">
                    <span class="text-white  font-normal" *ngIf="!signInForm.disabled">
                        Log in to Chat Inc
                    </span>
                    <mat-progress-spinner
                        *ngIf="isLoading3"
                        [diameter]="24"
                        [mode]="'indeterminate'"></mat-progress-spinner>
                </button>
                <!-- [disabled]="isMobile" -->

              
                <!-- Separator -->
                <div class="flex items-center mt-5">
                    <div class="flex-auto mt-px border-t"></div>
                    <div class="mx-2 text-secondary">
                          <div class="flex items-baseline mt-0.5 font-medium">
                                <div class="text-md ">Or continue with</div>
                                
                            </div>
                    </div>
                <div class="flex-auto mt-px border-t"></div>
                </div>
                

                <!-- Single sign-on buttons -->
                <button
                    
                    class="fuse-mat-button-large rounded-sm py-0 w-full mt-6"
                    mat-stroked-button
                    [color]="'accent'"
                    [disabled]="signInForm.disabled"
                    (click)="googleSignIn()">
                    <img class="h-5 w-5 mr-5" src="../../../../assets/images/custom/google.png">
                    <span class="tracking-wider font-normal" *ngIf="!signInForm.disabled">
                        Log in with Google
                    </span>

                
                
                </button>
                <!-- <button
                    
                class="fuse-mat-button-large rounded-sm py-0 w-full mt-5"
                mat-stroked-button
                [color]="'accent'"
                [disabled]="signInForm.disabled"
                (click)="microsoftSignIn()">
                <img class="h-5 mr-5" src="../../../../assets/images/custom/Microsoft_logo.svg.png">
                <span class="tracking-wider" *ngIf="!signInForm.disabled">
                    Log in with Microsoft
                </span>

            
            
                </button> -->
                <div class="mt-5 text-center text-xs text-gray-500">
                    All rights reserved. ChatInc &COPY; 2023
                </div>
                
            </form>
        </div>
    </div>





</div>

</ng-container>
<ng-container *ngIf="isLoading">

    <div class="flex w-screen h-screen bg-card items-center justify-center">
        <!-- <div class="mt-2"><mat-spinner [diameter]="18" [strokeWidth]="2" class="text-accent-900"></mat-spinner></div> -->
        
        <div  class="text-accent-900 font-bold   rounded-lg px-4 pr-4">

            <div style="transform: scale(.3) !important;"  class="lds-spinner">
                <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
            </div>


        </div>
        
        <div class="mt-3 text-lg font-light  ml-8 text-center " >Please hold - logging you in.</div>
    </div>
</ng-container>
