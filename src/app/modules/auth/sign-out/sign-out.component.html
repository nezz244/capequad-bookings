<div class="flex flex-col flex-auto items-center sm:justify-center min-w-0 bg-card">
    <div class="w-full sm:w-auto py-8 px-4 sm:p-12 ">
        <div class="w-full max-w-80 sm:w-80 mx-auto sm:mx-0">
            <!-- Logo -->
            <!-- <div class="w-60 pl-10">
                <img src="assets/images/logo/chatsooner.png">
            </div> -->
            <!-- Title -->
            <div class="text-5xl landing-text-white font-extrabold tracking-tight leading-tight text-center">Chat Inc</div>

            <div class="mt-10 text-2xl landing-text-white font-normal tracking-tight leading-tight text-center">You have signed out</div>
            <div class="flex justify-center mt-2 font-light" style="color: #737373 !important;">
                <!-- Redirect countdown -->
                <ng-container *ngIf="countdown > 0">
                    Redirecting in {{countdown | i18nPlural: countdownMapping }}
                </ng-container>

                <!-- Redirect message -->
                <ng-container *ngIf="countdown === 0">
                    You are now being redirected!
                </ng-container>
            </div>

            <!-- Form footer -->
            <div class="mt-8 text-md font-normal text-secondary text-center">
                <span>Go to</span>
                <a
                    class="ml-1 text-primary-500 hover:underline"
                    [routerLink]="['/sign-in']">sign in
                </a>
            </div>
        </div>
    </div>
</div>
