<div class="flex flex-col flex-auto items-center sm:justify-center min-w-0 bg-card" >
    <div class="w-full sm:w-auto py-8 px-4 sm:p-12 sm:rounded-2xl mt-10">
        <div class="w-full max-w-80 sm:w-80 mx-auto sm:mx-0">
        
            <!-- Title -->
            <div class="
             text-center text-7xl landing-text-white font-extrabold tracking-tight leading-tight">Chat Inc</div>
            <div class="mt-3 text-lg  tracking-tight text-center  items-center font-normal leading-tight " style="color: #737373 !important;">Forgot your password ?</div>
 
          
            <!-- Forgot password form -->
            <form
                class="mt-8"
                [formGroup]="forgotPasswordForm"
                #forgotPasswordNgForm="ngForm">

                <!-- Email field -->
                <div class="mb-2" >
                    <label class="text-accent-900 text-md  font-light">Please enter your registered email address.</label>

                </div>
                <div class="w-full mb-5">
                    <input
                      
                    id="email"
                    autofocus
                    class="border border-gray-900 pl-2 text-lg ring ring-2 rounded-sm w-full border border-dark min-h-10  shadow-primary"
                    [formControlName]="'email'">
                </div>

                <!-- Submit button -->
                <button
                    class="w-full mt-3 rounded-sm bg-accent-900"
                    mat-flat-button
                    
                    [disabled]="forgotPasswordForm.disabled"
                    (click)="resetPassword()">
                    <span class="text-white " *ngIf="!forgotPasswordForm.disabled">
                        Send reset link
                    </span>
                    <mat-progress-spinner
                        *ngIf="forgotPasswordForm.disabled"
                        [diameter]="24"
                        [mode]="'indeterminate'">
                    </mat-progress-spinner>
                </button>

             
                  <!-- Separator -->
                  <div class="flex items-center mt-8">
                    <div class="flex-auto mt-px border-t"></div>
                    <div class="mx-2 text-secondary">
                          <div class="flex  text-md items-baseline mt-0.5 font-medium">
                                <div>Return to</div>
                                <a
                                    class="ml-1 cursor-pointer  text-primary-500 hover:underline"
                                    [routerLink]="['/sign-in']">Sign in
                                </a>
                            </div>
                    </div>
                <div class="flex-auto mt-px border-t"></div>
                </div>

                <div class="text-xs  mt-5 " style="color:#737373 !important;" >
                    We will send you a password rest link to the email provided above. It may end in the spam folder, please check there  as well.
                </div>

            </form>
        </div>
    </div>
</div>
