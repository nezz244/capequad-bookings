<div class="p-4 bg-white rounded-lg relative w-full">

    <!-- Close Button -->
    <button (click)="close()"
            class="absolute top-2 right-2 text-gray-600 hover:text-gray-900 font-bold text-2xl">
        &times;
    </button>

    <h3 class="font-bold text-xl text-center mb-4">{{ data.title }}</h3>

    <!-- Scroll Buttons for Desktop -->
    <div class="hidden sm:flex justify-between mb-2">
        <button (click)="scrollGallery('left')" class="bg-gray-200 p-2 rounded hover:bg-gray-300">&lt;</button>
        <button (click)="scrollGallery('right')" class="bg-gray-200 p-2 rounded hover:bg-gray-300">&gt;</button>
    </div>

    <!-- Horizontal scroll gallery -->
    <div class="flex overflow-x-auto space-x-4 gallery-scroll scrollbar-hide pb-4">
        <div *ngFor="let img of data.gallery" class="flex-shrink-0 h-60 sm:h-72 w-80 sm:w-96 relative rounded-lg overflow-hidden">
            <img [src]="img"
                 alt="activity image"
                 loading="lazy"
                 class="w-full h-full object-cover transition-transform duration-300 hover:scale-105">
        </div>
    </div>

</div>
