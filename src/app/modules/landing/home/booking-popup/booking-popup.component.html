<div class="flex flex-col md:w-140 md:min-h-160 md:max-h-160 w-full h-full px-5 md:px-0 overflow-auto"
     style="position: relative; max-height: 90vh !important;"
     [perfectScrollbar]="config">

    <!-- Header -->
    <div class="flex flex-0 items-center justify-between h-16 pr-3 sm:pr-5 sm:pl-8 text-on-primary">
        <div class="text-dark">
            <div class="sm:text-3xl text-md text-headers">
                Booking {{activity?.title}}
            </div>
        </div>

        <button mat-icon-button (click)="saveAndClose()" [tabIndex]="-1">
            <i class="ph-bold ph-x icon-size-6 text-accent-900"></i>
        </button>
    </div>
    <!-- End Header -->

    <form [formGroup]="bookingForm" class="grid grid-cols-6 gap-6 sm:mx-10 md:mt-5">

        <!-- Full Name -->
        <div class="col-span-6">
            <label class="mb-2">Your full name</label>
            <input matInput class="mt-2 pl-2 text-lg rounded-md w-full border border-accent-900 h-12"
                   formControlName="fullName">
        </div>

        <!-- Phone -->
        <div class="col-span-6 md:col-span-3">
            <label>Your phone number</label>
            <ngx-intl-tel-input
                class="mt-2"
                [enableAutoCountrySelect]="false"
                [searchCountryFlag]="true"
                [selectedCountryISO]="CountryISO.SouthAfrica"
                [maxLength]="15"
                [phoneValidation]="false"
                formControlName="phoneNumber">
            </ngx-intl-tel-input>
        </div>

        <!-- Email -->
        <div class="col-span-6 md:col-span-3">
            <label>Your email address</label>
            <input matInput class="mt-2 pl-2 text-lg w-full h-12 border border-accent-900"
                   formControlName="email">
        </div>

        <!-- Tickets -->
        <div class="col-span-6 md:col-span-3">
            <label>Number of tickets</label>
            <input type="number"
                   (change)="checkNumber()"
                   class="mt-2 pl-2 text-lg w-full h-12 border border-accent-900"
                   formControlName="numberOfPeople">
        </div>

        <div class="col-span-6">
            <label class="mb-2 block">Optional add-ons <span class="text-gray-500 font-normal">(per person)</span></label>
            <div class="flex flex-col gap-2 rounded-md border border-accent-900 p-3">
                <mat-checkbox color="primary" formControlName="addonLunch">
                    Burger and chips lunch — ZAR {{ addonPricePerPerson('lunch') }} per person
                </mat-checkbox>
                <mat-checkbox color="primary" formControlName="addonTransport">
                    Transport — ZAR {{ addonPricePerPerson('transport') }} per person
                </mat-checkbox>
            </div>
        </div>

        <!-- Total -->
        <div class="col-span-6 flex justify-end border border-accent-900 rounded-md p-4">
            <span class="text-gray-500 mr-2">ZAR</span>
            <span class="text-xl font-bold">{{ getTotalPrice() }}</span>
        </div>

        <!-- Date -->
        <div class="col-span-6">
            <label>Pick date & time (10am - 5pm)</label>
            <div class="flex border border-accent-900 h-12 rounded-lg mt-2">
                <input matInput
                       class="ml-3 w-full"
                       [ngxMatDatetimePicker]="picker"
                       [formControl]="dateControl">

                <ngx-mat-datetime-picker #picker></ngx-mat-datetime-picker>

                <mat-datepicker-toggle matSuffix [for]="picker">
                    <mat-icon matDatepickerToggleIcon>
                        <i class="ph ph-calendar icon-size-5 text-dark"></i>
                    </mat-icon>
                </mat-datepicker-toggle>
            </div>
        </div>

        <!-- Actions -->
        <div class="col-span-6 flex mt-6">
            <button (click)="checkout()"
                    class="bg-purple-900 text-white rounded-md px-10 py-2">
                Continue to payment
            </button>

            <div (click)="saveAndClose()"
                 class="underline cursor-pointer ml-auto mt-2 text-warn-700">
                Cancel
            </div>
        </div>

    </form>
</div>
