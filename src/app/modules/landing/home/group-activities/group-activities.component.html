<div class="w-full flex-1 bg-dark p-5 pb-10">
    <div class="mx-auto max-w-xl">
        <h1 class="text-center font-bold text-headers text-3xl text-white sm:text-4xl">
            Group activities
        </h1>
        <p class="mt-3 text-center text-sm text-gray-300 sm:text-base">
            Tell us how to reach you and what kind of event you are planning. We will email our team and get back to you.
        </p>

        <form [formGroup]="form" class="mt-10 space-y-6 rounded-2xl bg-white/5 p-6 ring-1 ring-white/10 sm:p-8">
            <div>
                <label class="mb-2 block text-sm font-medium text-gray-200">Your full name</label>
                <input
                    matInput
                    formControlName="fullName"
                    class="h-12 w-full rounded-lg border border-white/20 bg-dark px-3 text-white placeholder-gray-500 focus:border-purple-400 focus:outline-none focus:ring-1 focus:ring-purple-500" />
            </div>

            <div>
                <label class="mb-2 block text-sm font-medium text-gray-200">Email address</label>
                <input
                    matInput
                    type="email"
                    formControlName="email"
                    class="h-12 w-full rounded-lg border border-white/20 bg-dark px-3 text-white placeholder-gray-500 focus:border-purple-400 focus:outline-none focus:ring-1 focus:ring-purple-500" />
            </div>

            <div>
                <label class="mb-2 block text-sm font-medium text-gray-200">Phone (WhatsApp)</label>
                <ngx-intl-tel-input
                    [enableAutoCountrySelect]="false"
                    [searchCountryFlag]="true"
                    [selectedCountryISO]="CountryISO.SouthAfrica"
                    [maxLength]="15"
                    [phoneValidation]="false"
                    formControlName="phoneNumber">
                </ngx-intl-tel-input>
            </div>

            <fieldset>
                <legend class="mb-3 text-sm font-medium text-gray-200">Type of group activity</legend>
                <mat-radio-group
                    formControlName="activityType"
                    class="flex flex-col gap-3">
                    <mat-radio-button *ngFor="let t of activityTypes" [value]="t.id" color="primary" class="text-white">
                        {{ t.label }}
                    </mat-radio-button>
                </mat-radio-group>
            </fieldset>

            <div>
                <label class="mb-2 block text-sm font-medium text-gray-200">Message <span class="font-normal text-gray-500">(optional)</span></label>
                <textarea
                    matInput
                    formControlName="message"
                    rows="4"
                    placeholder="Dates, group size, special requirements..."
                    class="w-full rounded-lg border border-white/20 bg-dark px-3 py-2 text-white placeholder-gray-500 focus:border-purple-400 focus:outline-none focus:ring-1 focus:ring-purple-500"></textarea>
            </div>

            <div class="pt-2">
                <button
                    mat-flat-button
                    type="button"
                    color="primary"
                    class="w-full rounded-full bg-purple-900 px-8 py-2 font-semibold text-white hover:bg-purple-800 md:w-auto"
                    [disabled]="isSubmitting"
                    (click)="submit()">
                    <span *ngIf="!isSubmitting">Submit</span>
                    <span *ngIf="isSubmitting" class="inline-flex items-center gap-2">
                        <mat-spinner diameter="22"></mat-spinner>
                        Sending…
                    </span>
                </button>
            </div>
        </form>
    </div>
</div>
